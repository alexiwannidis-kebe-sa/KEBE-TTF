name: Upload latest snapshot to OneDrive

on:
  workflow_dispatch:
  schedule:
    - cron: "5 21 * * *"   # 23:05 Greece time (EET/EEST depends); adjust if needed

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Microsoft (client credentials)
        uses: microsoftgraph/msgraph-sdk-javascript-auth@v1
        with:
          tenantId: ${{ secrets.AZURE_TENANT_ID }}
          clientId: ${{ secrets.AZURE_CLIENT_ID }}
          clientSecret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Upload newest CSV to OneDrive folder
        env:
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          set -e

          echo "Installing tools..."
          sudo apt-get update -y
          sudo apt-get install -y jq curl

          echo "Finding newest CSV under snapshots/ ..."
          FILE=$(ls -1t snapshots/*.csv | head -n 1)
          echo "Newest file: $FILE"

          echo "Getting access token..."
          TOKEN=$(curl -s -X POST "https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${CLIENT_ID}" \
            -d "scope=https%3A%2F%2Fgraph.microsoft.com%2F.default" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "grant_type=client_credentials" | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to get token"
            exit 1
          fi

          # Upload to OneDrive root folder path:
          # IMPORTANT: change this to your OneDrive folder path (next step)
          ONEDRIVE_PATH="TTF_Curve_Snapshots"

          BASENAME=$(basename "$FILE")
          echo "Uploading to OneDrive: ${ONEDRIVE_PATH}/${BASENAME}"

          curl -s -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: text/csv" \
            --data-binary @"$FILE" \
            "https://graph.microsoft.com/v1.0/users/a_ioannidis_kebe-sa_gr/drive/root:/${ONEDRIVE_PATH}/${BASENAME}:/content" \
            | jq .
